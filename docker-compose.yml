version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dxscan_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: dxscan_redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: dxscan_api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  dashboard:
    build: ./frontend
    container_name: dxscan_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - db

volumes:
  postgres_data: